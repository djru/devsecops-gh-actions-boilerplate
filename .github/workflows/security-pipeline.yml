name: Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1' # Runs every Monday at midnight

permissions:
  contents: read

jobs:
  scan-secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # Fetch all history for accurate secret scanning

      - name: Trufflehog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  static-analysis:
    name: SAST via Semgrep
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # Required to upload findings to GitHub Security Tab
    container:
      image: returntocorp/semgrep:1.77.0 # Pinning to a specific stable engine version
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Semgrep Scan
        run: |
          semgrep scan \
            --config auto \
            --sarif \
            --output semgrep-results.sarif \
            ./app

      - name: Upload Semgrep Results to GitHub
        uses: github/codeql-action/upload-sarif@48cd3c15e9f3b71b930d30b21c5c8c5221b18cc1 # v3.25.11
        if: always()
        with:
          sarif_file: semgrep-results.sarif

  dependency-analysis:
    name: Container & Dependency Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Build Local Container Image
        run: |
          docker build -t starlette-app:local .

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # Pinned to safe SHA following 2026 supply chain advisory
        with:
          image-ref: 'starlette-app:local'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy Results to GitHub
        uses: github/codeql-action/upload-sarif@48cd3c15e9f3b71b930d30b21c5c8c5221b18cc1 # v3.25.11
        if: always()
        with:
          sarif_file: trivy-results.sarif