name: Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1' # Runs every Monday at midnight

permissions:
  contents: read
  security-events: write

jobs:
  scan-secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Trufflehog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified

  semgrep:
    name: semgrep/ci
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep

    if: (github.actor != 'dependabot[bot]')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Semgrep Scan
        run: |
          semgrep scan \
            --config="p/default" \
            --sarif \
            --output=semgrep-results.sarif \
            ./app

      - name: Upload Semgrep Results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
  scan-source:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy Deps Results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif
          category: 'trivy-dependencies'
      
      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-iac-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy IAC Results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-iac-results.sarif
          category: 'trivy-iac'

  build-and-scan-container:
    name: Container Build, Security Scan, and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # Required to push to GHCR
      security-events: write # Required to upload Trivy SARIF reports
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # STEP 1: Build the image locally (Do not push to the registry yet)
      - name: Build Local Container Image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true # Crucial: This injects the built image directly into the local Docker daemon
          tags: |
            ghcr.io/${{ github.repository }}/starlette-app:${{ github.sha }}

      # STEP 2: Scan the local image you just built
      - name: Run Trivy Image Scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'ghcr.io/${{ github.repository }}/starlette-app:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL'
          ignore-unfixed: true

      # STEP 3: Upload Trivy findings to the Security Tab
      - name: Upload Trivy Image Results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-image-results.sarif

      # STEP 4: Authenticate to the registry (Only runs if Trivy doesn't find CRITICAL flaws)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # STEP 5: Push the pre-tested image to the registry
      - name: Push Tested Container Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/starlette-app:latest
            ghcr.io/${{ github.repository }}/starlette-app:${{ github.sha }}
  iac-validation:
    name: Terraform Test via Floci
    runs-on: ubuntu-latest
    needs: [build-and-scan-container] # Only runs if your security and build steps pass
    
    # Run Floci as a native background service container on the runner host
    services:
      floci:
        image: floci/floci:latest
        ports:
          - 4566:4566

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload Checkov Results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: 'checkov-compliance'

      # Generate the planning graph by translating github.repository metadata lowercase 
      # to prevent string validation errors on capitalized GitHub names.
      - name: Terraform Plan
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_URI="${REPO_LOWER}/starlette-app:${{ github.sha }}"
          terraform plan -var="container_image_tag=${IMAGE_URI}"

      # Deploy the ECS Topography into the Floci service layer
      - name: Terraform Apply
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_URI="${REPO_LOWER}/starlette-app:${{ github.sha }}"
          terraform apply -auto-approve -var="container_image_tag=${IMAGE_URI}"