name: Security Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 1' # Runs every Monday at midnight

permissions:
  contents: read
  security-events: write

jobs:
  scan-secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Trufflehog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          extra_args: --debug --only-verified

  semgrep:
    name: semgrep/ci
    runs-on: ubuntu-latest

    container:
      image: semgrep/semgrep

    if: (github.actor != 'dependabot[bot]')

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6
      - name: Semgrep Scan
        run: |
          semgrep scan \
            --config="p/default" \
            --sarif \
            --output=semgrep-results.sarif \
            ./app

      - name: Upload Semgrep Results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep-results.sarif
  scan-python-deps:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Run Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy Results to GitHub
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-fs-results.sarif

  build-and-scan-container:
    name: Container Build, Security Scan, and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # Required to push to GHCR
      security-events: write # Required to upload Trivy SARIF reports
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # STEP 1: Build the image locally (Do not push to the registry yet)
      - name: Build Local Container Image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true # Crucial: This injects the built image directly into the local Docker daemon
          tags: |
            ghcr.io/${{ github.repository }}/starlette-app:${{ github.sha }}

      # STEP 2: Scan the local image you just built
      - name: Run Trivy Image Scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: 'image'
          image-ref: 'ghcr.io/${{ github.repository }}/starlette-app:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL'

      # STEP 3: Upload Trivy findings to the Security Tab
      - name: Upload Trivy Image Results to GitHub
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image-results.sarif

      # STEP 4: Authenticate to the registry (Only runs if Trivy doesn't find CRITICAL flaws)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # STEP 5: Push the pre-tested image to the registry
      - name: Push Tested Container Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/starlette-app:latest
            ghcr.io/${{ github.repository }}/starlette-app:${{ github.sha }}